name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            if [ ! -d ~/auto-appoinment-system ]; then
              git clone https://github.com/Rain-Great/auto-appoinment-system.git ~/auto-appoinment-system
            fi
            cd ~/auto-appoinment-system
            git pull origin main
            npm install --omit=dev
            mkdir -p data
            pm2 restart auto-appoinment-system || pm2 start app.js --name auto-appoinment-system
            pm2 save
